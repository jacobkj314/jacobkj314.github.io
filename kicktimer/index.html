<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kick Timer</title>
<style>
    body {font-family:Arial,Helvetica,sans-serif; text-align:center; margin:2rem;}
    #timer, #count {font-size:4rem; margin:1rem;}
    button {
        font-size:2rem;
        padding:1rem 2rem;
        margin:1rem;
        width:100%;
        height:600px;
        max-width:900px;
        border-radius:8px;
    }
</style>
</head>
<body>

<h1>Kick Timer</h1>

<div id="timer">00:00</div>
<button id="startBtn">Start Timer</button>

<div id="count">Kick count: 0</div>
<button id="kickBtn" disabled>Kick</button>

<script>
let timerInterval = null;
let startTime = 0;
let kickCount = 0;
const MAX_KICKS = 10;

const timerEl = document.getElementById('timer');
const startBtn = document.getElementById('startBtn');
const kickBtn = document.getElementById('kickBtn');
const countEl = document.getElementById('count');

function formatMs(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

startBtn.addEventListener('click', () => {
    if (timerInterval) {          // already running
      clearInterval(timerInterval);
      timerInterval = null;
    } 
    startBtn.innerHTML = "Restart";
    kickCount = 0;
    countEl.textContent = `Kick count: ${kickCount}`;
    startTime = Date.now();
    timerInterval = setInterval(() => {
        timerEl.textContent = formatMs(Date.now() - startTime);
    }, 250);
    kickBtn.disabled = false;
});

kickBtn.addEventListener('click', () => {
    if(timerInterval == null) return;
    kickCount++;
    countEl.textContent = `Kick count: ${kickCount}`;
    if (kickCount >= MAX_KICKS) {
        clearInterval(timerInterval);
        timerInterval = null;
        startBtn.innerHTML = "Start Timer";
        timerEl.innerHTML = "Result: " + timerEl.innerHTML;
        kickBtn.disabled = true;
    }
});
</script>

</body>
</html>
